site_name: OpenAgentMesh
site_url: https://openagentmesh.dev/
site_description: Python SDK for agent-to-agent communication over NATS
repo_url: https://github.com/openagentmesh/openagentmesh
repo_name: openagentmesh

theme:
  name: material
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.tabs
    - navigation.sections
    - navigation.footer
    - navigation.path
    - search.highlight
    - search.share
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Switch to system preference

plugins:
  - search
  - tags

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Getting Started:
      - Quickstart: quickstart.md
  - Learn:
      - learn/index.md
      - The Multi-Agent Landscape: learn/enterprise-landscape.md
      - OAM and MCP: learn/oam-and-mcp.md
      - OAM and A2A: learn/oam-and-a2a.md
      - Technology Stack: learn/technology.md
  - Concepts:
      - concepts/index.md
      - Agents: concepts/agents.md
      - Channels: concepts/channels.md
      - Contracts: concepts/contracts.md
      - Discovery: concepts/discovery.md
      - Invocation: concepts/invocation.md
      - Error Handling: concepts/errors.md
      - Usage Attribution: concepts/usage.md
  - Cookbook:
      - cookbook/index.md
      - Multi-Process Agents: cookbook/multi-process.md
      - Shared Plan Coordination: cookbook/shared-plan.md
  - API Reference:
      - api/index.md
      - AgentMesh: api/agentmesh.md
      - AgentContract: api/contract.md
      - CLI: api/cli.md
  - Architecture:
      - architecture/index.md
      - Protocol: architecture/protocol.md
      - Subject Naming: architecture/subjects.md
      - Message Envelope: architecture/envelope.md
  - Getting Help: help.md

name: Publish to PyPI
on:
  push:
    tags:
      - "v*"
permissions:
  contents: read
  id-token: write
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
      - name: Cache embedded NATS binary
        uses: actions/cache@v4
        with:
          path: ~/.agentmesh/bin
          key: nats-tools-${{ runner.os }}-2.10.24-nsc
      - name: Install nats-server
        run: |
          if [ ! -x ~/.agentmesh/bin/nats-server ]; then
            mkdir -p ~/.agentmesh/bin
            curl -fsSL https://github.com/nats-io/nats-server/releases/download/v2.10.24/nats-server-v2.10.24-linux-amd64.tar.gz \
              | tar xz --strip-components=1 -C ~/.agentmesh/bin nats-server-v2.10.24-linux-amd64/nats-server
          fi
      - name: Install nsc
        run: |
          if [ ! -x ~/.agentmesh/bin/nsc ]; then
            mkdir -p ~/.agentmesh/bin
            curl -fsSL https://github.com/nats-io/nsc/releases/download/v2.11.0/nsc-linux-amd64.zip -o /tmp/nsc.zip
            unzip -o /tmp/nsc.zip -d ~/.agentmesh/bin nsc
          fi
      - run: uv run pytest
  publish:
    needs: test
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            sdk-ts/pnpm-lock.yaml
            ui/pnpm-lock.yaml
      - name: Build the TS SDK (the ui/ link target)
        working-directory: sdk-ts
        run: |
          pnpm install --frozen-lockfile
          pnpm run build
      - name: Build the admin UI into the wheel (ADR-0056)
        run: |
          cd ui
          pnpm install --frozen-lockfile
          pnpm run build
          cd ..
          rm -rf src/openagentmesh/_ui_assets
          cp -r ui/dist src/openagentmesh/_ui_assets
      - run: uv build
      - uses: pypa/gh-action-pypi-publish@release/v1

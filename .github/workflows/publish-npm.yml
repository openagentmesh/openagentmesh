name: Publish to npm
on:
  push:
    tags:
      - "sdk-ts-v*"
permissions:
  contents: read
  id-token: write
jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk-ts
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: sdk-ts/pnpm-lock.yaml
      - name: Cache embedded NATS binary
        uses: actions/cache@v4
        with:
          path: ~/.agentmesh/bin
          key: nats-server-${{ runner.os }}-2.10.24
      - name: Install nats-server
        run: |
          if [ ! -x ~/.agentmesh/bin/nats-server ]; then
            mkdir -p ~/.agentmesh/bin
            curl -fsSL https://github.com/nats-io/nats-server/releases/download/v2.10.24/nats-server-v2.10.24-linux-amd64.tar.gz \
              | tar xz --strip-components=1 -C ~/.agentmesh/bin nats-server-v2.10.24-linux-amd64/nats-server
          fi
      - run: pnpm install --frozen-lockfile
      - run: npx tsc --noEmit
      - run: pnpm vitest run
  publish:
    needs: test
    runs-on: ubuntu-latest
    environment: npm
    defaults:
      run:
        working-directory: sdk-ts
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
      - name: Check tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#sdk-ts-v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag $TAG_VERSION does not match package.json $PKG_VERSION" >&2
            exit 1
          fi
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
